name: mediavore-translator-agent
version: 0.1.0
description: |
  Agent specification for MediaVore Translator — helps with CSV -> TMDB JSON mapping,
  searching TMDB, and converting project CSV files to the repo's target JSON format.
author: MediaVore Maintainers
homepage: https://github.com/Zimberts/mediavore-translatore
language: en
platforms:
  - web
  - cli
capabilities:
  - search-tmdb: "Performs TMDB lookups and returns best-match candidates"
  - csv-to-json: "Converts CSV rows into the project's JSON schema"
  - suggest-mapping: "Suggests mappings for ambiguous titles and asks for clarification"
inputs:
  - films.csv (or user uploaded CSV)
outputs:
  - output.json (converted entries)
constraints:
  - Use `TMDB_API_TOKEN` from environment for server-side searches.
  - Do not return TMDB API keys in outputs or logs.
  - When multiple TMDB candidates, prompt the user rather than guessing.
examples:
  - user: "Auto-search unique titles and auto-select unambiguous results"
  - user: "Export JSON with season/episode when present"
